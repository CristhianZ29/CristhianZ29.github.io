<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cristhian Zambrano | Notas Académicas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <div class="logo">CZ</div>
    <ul>
        <li><a href="#notas">Notas</a></li>
    </ul>
</nav>

<section class="hero">
    <h1>Centro de Apuntes</h1>
    <p>Organiza y documenta tu aprendizaje universitario.</p>
</section>

<section id="notas" class="section">

    <h2>Crear nueva nota</h2>

    <form id="noteForm">
        <input type="text" id="title" placeholder="Título de la nota" required>
        <input type="text" id="subject" placeholder="Materia" required>
        <textarea id="description" placeholder="Escribe tu nota aquí..." required></textarea>
        <input type="file" id="file">
        <button type="submit">Guardar nota</button>
    </form>

    <h2 style="margin-top:60px;">Notas guardadas</h2>
    <div id="notesContainer"></div>

</section>

<footer>
    © 2026 Cristhian Zambrano — Ingeniería de Sistemas
</footer>

<script src="script.js"></script>
</body>
</html>
